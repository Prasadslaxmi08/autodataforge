# Local deployment: three services, one command. `docker compose up` brings up the
# API, a background worker, and Postgres (pgvector). GPU wiring for the worker is
# commented out below — uncomment it on a CUDA host.
services:
  app:
    build: .
    command: autodataforge serve --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      VDS_STORAGE__DATABASE_URL: postgresql+psycopg://vds:vds@postgres:5432/vds
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres

  worker:
    build: .
    command: autodataforge worker
    environment:
      VDS_STORAGE__DATABASE_URL: postgresql+psycopg://vds:vds@postgres:5432/vds
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
    # GPU (uncomment on a CUDA host):
    # deploy:
    #   resources:
    #     reservations:
    #       devices: [{ driver: nvidia, count: 1, capabilities: [gpu] }]

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vds
      POSTGRES_PASSWORD: vds
      POSTGRES_DB: vds
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
